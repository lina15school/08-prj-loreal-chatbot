<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Assistant</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img class="brand-logo" src="img/loreal-logo.png" alt="L'Oréal logo" />
        <h1 class="site-title">L’Oréal Beauty Chat</h1>
        <p class="site-subtitle">
          Ask about products, skincare routines, and beauty recommendations.
        </p>
      </header>

      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <div id="latestQuestion" class="latest-question" aria-live="polite">
            Ask a question and I’ll recommend the best L’Oréal options.
          </div>
          <div id="chatWindow" class="chat-window" aria-live="polite">
            <!-- messages will be appended here via JS -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask about L’Oréal products, routines, or recommendations…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn" aria-label="Send message">
              <span class="material-icons">send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2026 L’Oréal Paris. All rights reserved.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
